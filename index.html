<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body {
    background-color: #f4f6f8;
    color: #333;
    height: 100vh;
    display: flex;
}

.app-container {
    display: flex;
    width: 100%;
    height: 100%;
}

/* Sidebar Styling */
.sidebar {
    width: 260px;
    background-color: #ffffff;
    border-right: 1px solid #e1e4e8;
    display: flex;
    flex-direction: column;
    padding: 20px;
}

.brand {
    margin-bottom: 40px;
}

.brand h2 {
    font-size: 1.5rem;
    color: #2c3e50;
}

.nav-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    color: #888;
    font-weight: 600;
    margin-bottom: 10px;
    margin-top: 20px;
}

.nav-item {
    display: block;
    padding: 10px 15px;
    text-decoration: none;
    color: #4a5568;
    border-radius: 6px;
    margin-bottom: 5px;
    font-weight: 500;
    transition: background-color 0.2s, color 0.2s;
}

.nav-item:hover {
    background-color: #f0f4f8;
    color: #2b6cb0;
}

.nav-item.active {
    background-color: #ebf8ff;
    color: #2b6cb0;
    font-weight: 600;
}

.bottom-nav {
    margin-top: auto; /* Pushes profile/logout to the bottom */
}

.logout {
    color: #e53e3e;
}

.logout:hover {
    background-color: #fff5f5;
    color: #c53030;
}

/* Main Content Styling */
.content {
    flex: 1;
    padding: 40px;
    overflow-y: auto;
}

.content-header {
    margin-bottom: 30px;
}

.content-header h1 {
    font-size: 2rem;
    color: #1a202c;
}

/* Task Input */
.task-input-section {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
}

.task-input {
    flex: 1;
    padding: 12px 15px;
    font-size: 1rem;
    border: 1px solid #cbd5e0;
    border-radius: 6px;
    outline: none;
}

.task-input:focus {
    border-color: #3182ce;
    box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.2);
}

.add-btn {
    background-color: #3182ce;
    color: white;
    border: none;
    padding: 0 20px;
    font-size: 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    transition: background-color 0.2s;
}

.add-btn:hover {
    background-color: #2b6cb0;
}

/* Task List */
.task-list {
    list-style: none;
    background: #ffffff;
    border: 1px solid #e1e4e8;
    border-radius: 8px;
    overflow: hidden;
}

.task-item {
    display: flex;
    align-items: center;
    padding: 15px 20px;
    border-bottom: 1px solid #e1e4e8;
}

.task-item:last-child {
    border-bottom: none;
}

.task-item input[type="checkbox"] {
    margin-right: 15px;
    width: 18px;
    height: 18px;
    cursor: pointer;
}

.task-item label {
    flex: 1;
    font-size: 1rem;
    color: #2d3748;
    cursor: pointer;
}

.task-item.completed label {
    text-decoration: line-through;
    color: #a0aec0;
}

/* Tags */
.tag {
    font-size: 0.75rem;
    padding: 4px 8px;
    border-radius: 4px;
    font-weight: 600;
}

.tag.self {
    background-color: #ebf8ff;
    color: #2b6cb0;
}

.tag.group {
    background-color: #faf5ff;
    color: #6b46c1;
}
</style>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">
                <h2>TaskManager</h2>
            </div>
            
            <nav class="main-nav">
                <p class="nav-label">Menu</p>
                <a href="#" class="nav-item active">My Tasks</a>
                <a href="#" class="nav-item">Group Tasks</a>
            </nav>

            <div class="bottom-nav">
                <p class="nav-label">Account</p>
                <a href="#" class="nav-item">Profile</a>
                <a href="#" class="nav-item logout">Log Out</a>
            </div>
        </aside>

        <main class="content">
            <header class="content-header">
                <h1>My Tasks</h1>
            </header>

            <div class="task-input-section">
                <input type="text" placeholder="What needs to be done?" class="task-input">
                <button class="add-btn">Add Task</button>
            </div>

            <ul class="task-list">
                <li class="task-item">
                    <input type="checkbox" id="task1">
                    <label for="task1">Finish API integration</label>
                    <span class="tag self">Self</span>
                </li>
                <li class="task-item">
                    <input type="checkbox" id="task2">
                    <label for="task2">Update database schema</label>
                    <span class="tag group">Dev Team</span>
                </li>
                <li class="task-item completed">
                    <input type="checkbox" id="task3" checked>
                    <label for="task3">Review pull requests</label>
                    <span class="tag self">Self</span>
                </li>
            </ul>
        </main>
    </div>
</body>
</html>
